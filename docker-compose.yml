version: '3.9'

# ─────────────────────────────────────────────────────────────────────────────
# Dataflow v9 pruebas — Docker Compose
#
# Lee las variables del archivo .env en la raíz del proyecto.
# No hay nada hardcodeado aquí — todo viene del .env.
#
# PASOS PARA LEVANTAR:
#   1. Tener Docker Desktop instalado y corriendo
#   2. Desde la raíz del proyecto, ejecutar:
#        docker compose up -d
#   3. Crear el esquema (solo la primera vez):
#        docker compose exec db psql -U dataflow -d dataflow -f /sql/01_schema.sql
#        docker compose exec db psql -U dataflow -d dataflow -f /sql/02_seed.sql
#   4. En otra terminal, levantar el frontend:
#        npm install
#        npm run dev
#   5. Abrir http://localhost:5173
#      Login: admin / Admin-1234
# ─────────────────────────────────────────────────────────────────────────────

services:

  db:
    image: postgres:15-alpine
    container_name: dataflow_db
    restart: unless-stopped
    environment:
      POSTGRES_USER:     ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB:       ${POSTGRES_DB}
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./backend/sql:/sql:ro

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: dataflow_backend
    restart: unless-stopped
    depends_on:
      - db
    env_file:
      - ./backend/.env
    ports:
      - "${PORT}:${PORT}"
    volumes:
      - ./backend:/app
      - /app/node_modules
      - uploads:/app/uploads

volumes:
  pgdata:
  uploads:
